name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages site from README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install markdown Pygments

      - name: Convert README to HTML
        run: |
          mkdir -p _site
          python - <<'EOF'
          import markdown
          import pathlib

          src = pathlib.Path("README.md").read_text(encoding="utf-8")
          extensions = ["fenced_code", "tables", "toc", "codehilite"]
          body = markdown.markdown(src, extensions=extensions)

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Transformer Research Hub</title>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                     max-width: 960px; margin: 2rem auto; padding: 0 1.5rem;
                     color: #24292f; line-height: 1.6; }}
              h1, h2, h3 {{ border-bottom: 1px solid #d0d7de; padding-bottom: .3em; }}
              a {{ color: #0969da; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
              code {{ background: #f6f8fa; border-radius: 6px; padding: .2em .4em; font-size: 85%; }}
              pre {{ background: #f6f8fa; border-radius: 6px; padding: 1em; overflow-x: auto; }}
              pre code {{ background: none; padding: 0; }}
              table {{ border-collapse: collapse; width: 100%; }}
              th, td {{ border: 1px solid #d0d7de; padding: .5em 1em; }}
              th {{ background: #f6f8fa; }}
              img {{ max-width: 100%; height: auto; }}
            </style>
          </head>
          <body>
          {body}
          </body>
          </html>"""

          pathlib.Path("_site/index.html").write_text(html, encoding="utf-8")
          print("Built _site/index.html")
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
