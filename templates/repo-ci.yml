---
# Reusable CI workflow template for Transformer Research Hub sister repos.
# Copy to .github/workflows/ci.yml in each sister repo and replace
# the placeholder {{REPO_SLUG}} with the actual repo name/package directory.
#
# Required repository secrets:
#   WANDB_API_KEY  – Weights & Biases API key (set to any value to disable wandb in CI)
#
# Usage:
#   1. Copy this file to .github/workflows/ci.yml in the target repo.
#   2. Replace {{REPO_SLUG}} with the Python package directory (e.g. "src").
#   3. Adjust the python-version matrix as needed.

name: CI

on:
  push:
    branches: [main, "copilot/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: pip install ruff black

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check --line-length 100 .

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WANDB_DISABLED: "true"
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov={{REPO_SLUG}} \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

  type-check:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Run pyright
        run: pyright {{REPO_SLUG}}/
