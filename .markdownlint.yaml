# Markdownlint configuration for Transformer Research Hub
# Many rules are relaxed to accommodate the badge-heavy, link-rich style
# of this documentation.

# MD013 — line length: disabled project-wide because shields.io badge URLs
# and GitHub links routinely exceed 80 characters.
MD013: false

# MD022 — blanks around headings: disabled because the docs/reviews/* files
# use a compact heading+list format without extra blank lines.
MD022: false

# MD032 — blanks around lists: disabled for the same compact review-doc style.
MD032: false

# MD033 — no inline HTML: disabled because README uses <div align="center">
# and <table> blocks for layout purposes.
MD033: false

# MD036 — no emphasis as heading: disabled because the README uses bold/italic
# for decorative sub-labels, not as structural headings.
MD036: false

# MD040 — fenced code language: disabled for ASCII-art diagrams and shell
# snippets that do not map to a supported language identifier.
MD040: false

# MD041 — first line heading: disabled because README starts with an HTML <div>
# for centering, not a bare Markdown heading.
MD041: false

# MD060 — table column style: disabled because the badge-heavy tables use a
# compact format that markdownlint's "compact" style checker misidentifies.
MD060: false
